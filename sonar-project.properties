sonar.projectKey=xzawed_xzawed-pais
sonar.organization=xzawed

# 소스 경로 (모노레포 명시)
sonar.sources=xzawedOrchestrator/packages/server/src,xzawedOrchestrator/packages/shared/src,xzawedOrchestrator/packages/app/src,xzawedOrchestrator/packages/ui/src,xzawedManager/packages/server/src,xzawedPlanner/src,xzawedDeveloper/src,xzawedDesigner/src,xzawedTester/src,xzawedBuilder/src,xzawedWatcher/src,xzawedSecurity/src,xzawedShared/src

# 테스트·빌드 결과·타입선언 제외
# ⚠️ sonar.cpd.exclusions: Automatic Analysis에서 완전 무효
# ⚠️ sonar.exclusions 와일드카드: PR 신규 코드 CPD 분석에서도 동작하지 않음 — 실제 중복 제거 필요
# consumer.ts: BaseConsumer(xzawedShared/src)와 패턴 중복 가능성 — CPD 오탐 방지
sonar.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**,**/dist/**,**/build/**,**/.turbo/**,**/*.d.ts,**/node_modules/**,xzawedOrchestrator/packages/server/src/streams/consumer.ts,**/pnpm-lock.yaml,**/package-lock.json,xzawedLauncher/**
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**
sonar.cpd.minimumTokens=100

# 커버리지 제외 대상:
# 1. Electron renderer/preload 및 순수 UI 컴포넌트 — browser 테스트 또는 E2E로 검증
# 2. 서비스 진입점(index.ts) — process.main 호출만 하므로 단위 테스트 불가
# 3. Fastify HTTP 서버 설정(server.ts) — 독립 서비스의 /health 라우트 전용, 단위 테스트 불가
# 4. DB 연결 인프라 및 타입 정의 — 런타임 의존성, 단위 테스트 불가
# 5. Orchestrator PostgreSQL 어댑터 — 실제 DB 없이 단위 테스트 불가 (Manager db/** 와 동일한 이유)
sonar.coverage.exclusions=xzawedOrchestrator/packages/app/src/renderer/src/components/**,xzawedOrchestrator/packages/app/src/renderer/src/App.tsx,xzawedOrchestrator/packages/app/src/renderer/src/main.tsx,xzawedOrchestrator/packages/app/src/renderer/src/lib/api.ts,xzawedOrchestrator/packages/app/src/renderer/src/lib/markdown.ts,xzawedOrchestrator/packages/app/src/renderer/src/lib/utils.ts,xzawedOrchestrator/packages/app/src/preload/**,xzawedOrchestrator/packages/app/src/main/index.ts,xzawedOrchestrator/packages/app/src/main/server-manager.ts,xzawedOrchestrator/packages/ui/src/components/**,**/src/index.ts,xzawedOrchestrator/packages/server/src/mcp/entry.ts,xzawedOrchestrator/packages/server/src/db/**,xzawedOrchestrator/packages/server/src/sessions/pg-session.store.ts,xzawedOrchestrator/packages/server/src/sessions/message.repo.ts,xzawedOrchestrator/packages/server/src/auth/user.repo.ts,xzawedOrchestrator/packages/server/src/auth/refresh.repo.ts,xzawedManager/packages/server/src/server.ts,xzawedManager/packages/server/src/db/**,xzawedManager/packages/server/src/types/**,xzawedDesigner/src/server.ts,xzawedDeveloper/src/server.ts,xzawedSecurity/src/server.ts,xzawedTester/src/server.ts,xzawedWatcher/src/server.ts

# 커버리지 리포트 경로 (CI에서 vitest --coverage 실행 후 생성)
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
