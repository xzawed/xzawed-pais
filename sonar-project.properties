# 테스트·빌드 결과·타입선언 제외
# ⚠️ sonar.cpd.exclusions: Automatic Analysis에서 완전 무효
# ⚠️ sonar.exclusions 와일드카드: PR 신규 코드 CPD 분석에서도 동작하지 않음 — 실제 중복 제거 필요
# ⚠️ sonar.coverage.exclusions: PR 신규 코드 커버리지 분석에서도 동작하지 않음 — sonar.exclusions에 추가 필요
# consumer.ts: BaseConsumer(xzawedShared/src)와 패턴 중복 가능성 — CPD 오탐 방지
# 서비스 진입점 index.ts: process 부트스트랩 코드, 단위 테스트 불가
# Designer/Planner config.ts: 포트 번호만 다른 구조적으로 동일한 파일 — CPD 오탐 방지
# xzawedManager/packages/server/src/types/**: 타입 전용 파일 — 런타임 코드 없음
# refresh.repo.ts: PostgreSQL 어댑터 — createHash('sha256') S4787 hotspot, sonar.exclusions으로만 완전 억제 가능
# app/src/renderer/src/**: Electron 렌더러 전체 — browser 테스트(vitest) 및 E2E(Playwright)로 검증, node lcov 커버리지 미포함. PR 신규 코드 분석에서 coverage.exclusions 무효이므로 sonar.exclusions 와일드카드로 일괄 제외
# app/src/main/**: Electron main 프로세스 — IPC·OAuth·MCP 인프라, 통합 테스트 불가
# app/src/preload/**: Electron preload — contextBridge 래퍼, 단위 테스트 불가
sonar.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**,**/dist/**,**/build/**,**/.turbo/**,**/*.d.ts,**/node_modules/**,xzawedOrchestrator/packages/server/src/streams/consumer.ts,**/pnpm-lock.yaml,**/package-lock.json,xzawedLauncher/**,xzawedOrchestrator/packages/server/src/projects/workspace.service.ts,xzawedDesigner/src/index.ts,xzawedDeveloper/src/index.ts,xzawedPlanner/src/index.ts,xzawedTester/src/index.ts,xzawedBuilder/src/index.ts,xzawedSecurity/src/index.ts,xzawedWatcher/src/index.ts,xzawedManager/packages/server/src/types/**,xzawedOrchestrator/packages/server/src/auth/refresh.repo.ts,xzawedOrchestrator/packages/app/src/renderer/src/**,xzawedOrchestrator/packages/app/src/main/**,xzawedOrchestrator/packages/app/src/preload/**,xzawedOrchestrator/packages/server/src/sessions/pg-session.store.ts,xzawedOrchestrator/packages/server/src/streams/redis.client.ts,xzawedManager/packages/server/src/server.ts,xzawedManager/packages/server/src/streams/redis.client.ts,xzawedDesigner/src/config.ts,xzawedPlanner/src/config.ts
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**
sonar.cpd.minimumTokens=100

# 커버리지 제외 대상:
# 1. Electron renderer/preload/main — browser 테스트 또는 E2E로 검증 (sonar.exclusions에도 포함)
# 2. 서비스 진입점(index.ts) — process.main 호출만 하므로 단위 테스트 불가
# 3. Fastify HTTP 서버 설정(server.ts) — 독립 서비스의 /health 라우트 전용, 단위 테스트 불가
# 4. DB 연결 인프라 및 타입 정의 — 런타임 의존성, 단위 테스트 불가
# 5. Orchestrator PostgreSQL 어댑터 — 실제 DB 없이 단위 테스트 불가
sonar.coverage.exclusions=xzawedOrchestrator/packages/app/src/renderer/src/**,xzawedOrchestrator/packages/app/src/preload/**,xzawedOrchestrator/packages/app/src/main/**,xzawedOrchestrator/packages/ui/src/components/**,**/src/index.ts,xzawedOrchestrator/packages/server/src/mcp/entry.ts,xzawedOrchestrator/packages/server/src/db/**,xzawedOrchestrator/packages/server/src/sessions/pg-session.store.ts,xzawedOrchestrator/packages/server/src/sessions/message.repo.ts,xzawedOrchestrator/packages/server/src/auth/user.repo.ts,xzawedOrchestrator/packages/server/src/auth/refresh.repo.ts,xzawedOrchestrator/packages/server/src/github-tokens/github-token.repo.ts,xzawedOrchestrator/packages/server/src/streams/redis.client.ts,xzawedOrchestrator/packages/server/src/manager/manager.client.ts,xzawedOrchestrator/packages/server/src/ws/session.ws.ts,xzawedOrchestrator/packages/server/src/claude/ssh-remote-runner.ts,xzawedOrchestrator/packages/server/src/claude/api-runner.ts,xzawedOrchestrator/packages/server/src/claude/intent-structurer.ts,xzawedManager/packages/server/src/server.ts,xzawedManager/packages/server/src/db/**,xzawedManager/packages/server/src/types/**,xzawedManager/packages/server/src/streams/redis.client.ts,xzawedDesigner/src/server.ts,xzawedDeveloper/src/server.ts,xzawedSecurity/src/server.ts,xzawedTester/src/server.ts,xzawedWatcher/src/server.ts

