name: Launcher Release

on:
  push:
    tags: ['launcher-v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with: { version: 10 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }
      - name: Install dependencies
        working-directory: xzawedLauncher
        run: pnpm install --frozen-lockfile
      - name: Build shared
        working-directory: xzawedLauncher/packages/shared
        run: pnpm build
      - name: Test
        working-directory: xzawedLauncher/packages/app
        run: pnpm test
      - name: Build app
        working-directory: xzawedLauncher/packages/app
        run: pnpm build
      - name: Package app
        working-directory: xzawedLauncher/packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --publish never
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launcher-windows
          path: |
            xzawedLauncher/packages/app/dist/*.exe
            xzawedLauncher/packages/app/dist/latest.yml

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with: { version: 10 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }
      - name: Install dependencies
        working-directory: xzawedLauncher
        run: pnpm install --frozen-lockfile
      - name: Build shared
        working-directory: xzawedLauncher/packages/shared
        run: pnpm build
      - name: Test
        working-directory: xzawedLauncher/packages/app
        run: pnpm test
      - name: Build app
        working-directory: xzawedLauncher/packages/app
        run: pnpm build
      - name: Package app
        working-directory: xzawedLauncher/packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --publish never
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launcher-macos
          path: |
            xzawedLauncher/packages/app/dist/*.dmg
            xzawedLauncher/packages/app/dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with: { version: 10 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }
      - name: Install dependencies
        working-directory: xzawedLauncher
        run: pnpm install --frozen-lockfile
      - name: Build shared
        working-directory: xzawedLauncher/packages/shared
        run: pnpm build
      - name: Test
        working-directory: xzawedLauncher/packages/app
        run: pnpm test
      - name: Build app
        working-directory: xzawedLauncher/packages/app
        run: pnpm build
      - name: Package app
        working-directory: xzawedLauncher/packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --publish never
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launcher-linux
          path: |
            xzawedLauncher/packages/app/dist/*.AppImage
            xzawedLauncher/packages/app/dist/*.deb
            xzawedLauncher/packages/app/dist/latest-linux.yml

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { path: artifacts }
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: artifacts/**/*
          generate_release_notes: true
