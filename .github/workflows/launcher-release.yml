name: Launcher Release

on:
  push:
    tags: ['launcher-v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 10 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - name: Install dependencies
        working-directory: xzawedLauncher
        run: pnpm install --frozen-lockfile
      - name: Build shared
        working-directory: xzawedLauncher/packages/shared
        run: pnpm build
      - name: Package app
        working-directory: xzawedLauncher/packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launcher-windows
          path: xzawedLauncher/packages/app/dist/*.exe

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 10 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - name: Install dependencies
        working-directory: xzawedLauncher
        run: pnpm install --frozen-lockfile
      - name: Build shared
        working-directory: xzawedLauncher/packages/shared
        run: pnpm build
      - name: Package app
        working-directory: xzawedLauncher/packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launcher-macos
          path: xzawedLauncher/packages/app/dist/*.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 10 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - name: Install dependencies
        working-directory: xzawedLauncher
        run: pnpm install --frozen-lockfile
      - name: Build shared
        working-directory: xzawedLauncher/packages/shared
        run: pnpm build
      - name: Package app
        working-directory: xzawedLauncher/packages/app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launcher-linux
          path: xzawedLauncher/packages/app/dist/*.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { path: artifacts }
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
