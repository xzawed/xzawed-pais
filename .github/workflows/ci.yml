name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Turborepo services ─────────────────────────────────────────────────────
  turborepo:
    name: "${{ matrix.service }} (Turborepo)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: xzawedOrchestrator
            dir: xzawedOrchestrator
          - service: xzawedManager
            dir: xzawedManager
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.dir }}/pnpm-lock.yaml

      - name: Build xzawedShared
        if: matrix.service == 'xzawedManager'
        working-directory: xzawedShared
        run: pnpm install && pnpm build

      - name: Install
        working-directory: ${{ matrix.dir }}
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: matrix.service == 'xzawedOrchestrator'
        working-directory: ${{ matrix.dir }}
        run: pnpm --filter @xzawed/app exec playwright install --with-deps chromium

      - name: Build
        working-directory: ${{ matrix.dir }}
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: pnpm build

      - name: Build web app
        if: matrix.service == 'xzawedOrchestrator'
        working-directory: ${{ matrix.dir }}
        run: pnpm --filter @xzawed/web build

      - name: Test + coverage server (shard 1/2)
        working-directory: ${{ matrix.dir }}/packages/server
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/postgres
          NODE_OPTIONS: --max-old-space-size=2048
        run: pnpm vitest run --coverage --coverage.reportsDirectory=coverage/shard-1 --shard=1/2

      - name: Test + coverage server (shard 2/2)
        working-directory: ${{ matrix.dir }}/packages/server
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/postgres
          NODE_OPTIONS: --max-old-space-size=2048
        run: pnpm vitest run --coverage --coverage.reportsDirectory=coverage/shard-2 --shard=2/2

      - name: Merge server coverage
        working-directory: ${{ matrix.dir }}/packages/server
        run: pnpm vitest merge-coverage coverage/shard-1 coverage/shard-2

      - name: Test app
        if: matrix.service == 'xzawedOrchestrator'
        working-directory: ${{ matrix.dir }}/packages/app
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
          NODE_OPTIONS: --max-old-space-size=2048
        run: pnpm vitest run --reporter=dot

      - name: Test ui
        if: matrix.service == 'xzawedOrchestrator'
        working-directory: ${{ matrix.dir }}/packages/ui
        run: pnpm vitest run --reporter=dot

      - name: Generate ui coverage
        if: matrix.service == 'xzawedOrchestrator'
        working-directory: ${{ matrix.dir }}/packages/ui
        run: pnpm test:coverage

      - name: Generate app coverage
        if: matrix.service == 'xzawedOrchestrator'
        working-directory: ${{ matrix.dir }}/packages/app
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.dir }}/packages/*/coverage/lcov.info
          if-no-files-found: warn

      - name: Audit
        working-directory: ${{ matrix.dir }}
        run: pnpm audit --audit-level=moderate

  # ── Independent services ───────────────────────────────────────────────────
  independent:
    name: "${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - xzawedPlanner
          - xzawedDeveloper
          - xzawedDesigner
          - xzawedTester
          - xzawedBuilder
          - xzawedWatcher
          - xzawedSecurity

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ matrix.service }}/pnpm-lock.yaml

      - name: Build xzawedShared
        working-directory: xzawedShared
        run: pnpm install && pnpm build

      - name: Install
        working-directory: ${{ matrix.service }}
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ${{ matrix.service }}
        run: pnpm build

      - name: Test
        working-directory: ${{ matrix.service }}
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/lcov.info
          if-no-files-found: warn

      - name: Audit
        working-directory: ${{ matrix.service }}
        run: pnpm audit --audit-level=moderate

  # ── Launcher (Electron) ────────────────────────────────────────────────────
  launcher:
    name: xzawedLauncher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: xzawedLauncher/pnpm-lock.yaml

      - name: Install
        working-directory: xzawedLauncher
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: xzawedLauncher
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: pnpm build

      - name: Test
        working-directory: xzawedLauncher
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: pnpm test

      - name: Audit
        working-directory: xzawedLauncher
        run: pnpm audit --audit-level=moderate

  # ── xzawedShared ──────────────────────────────────────────────────────────
  shared-lib:
    name: xzawedShared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: xzawedShared/pnpm-lock.yaml

      - name: Install
        working-directory: xzawedShared
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: xzawedShared
        run: pnpm build

      - name: Test
        working-directory: xzawedShared
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xzawedShared
          path: xzawedShared/coverage/lcov.info
          if-no-files-found: warn

      - name: Audit
        working-directory: xzawedShared
        run: pnpm audit --audit-level=moderate

  # ── Redis Streams Integration Tests ───────────────────────────────────────
  redis-integration:
    name: Redis Streams Integration Tests
    runs-on: ubuntu-latest
    needs: [turborepo, independent]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/postgres

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: xzawedOrchestrator/pnpm-lock.yaml

      - name: Install
        working-directory: xzawedOrchestrator
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: xzawedOrchestrator
        run: pnpm build

      - name: Run Redis Integration Tests
        working-directory: xzawedOrchestrator/packages/server
        env:
          REDIS_URL: redis://localhost:6379
        run: pnpm test -- --reporter=verbose src/__tests__/redis-streams.integration.test.ts

  # ── Playwright E2E (Electron) ─────────────────────────────────────────────
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [turborepo]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: xzawedOrchestrator/pnpm-lock.yaml

      - name: Install (with Electron binary)
        working-directory: xzawedOrchestrator
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: xzawedOrchestrator/packages/app
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: pnpm build

      - name: Install Playwright system deps
        working-directory: xzawedOrchestrator/packages/app
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        working-directory: xzawedOrchestrator/packages/app
        run: xvfb-run --server-args="-screen 0 1280x800x24" pnpm test:e2e

  # ── Copy-Paste Detection (PR only) ────────────────────────────────────────
  cpd:
    name: Copy-Paste Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jscpd
        run: npm install --ignore-scripts --no-fund --no-audit jscpd@3.5.10

      - name: Run jscpd
        id: jscpd
        run: |
          mkdir -p cpd-report
          ./node_modules/.bin/jscpd --config .jscpd.json --reporters json,markdown --output ./cpd-report || true

      - name: Post CPD report as PR comment
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            let body = '## Copy-Paste Detection Report\n\n'

            const mdPath = path.join('cpd-report', 'jscpd-report.md')
            if (fs.existsSync(mdPath)) {
              const md = fs.readFileSync(mdPath, 'utf8')
              body += md.trim() === '' ? '✅ No duplications found.' : md
            } else {
              body += '✅ No duplications found.'
            }

            body += '\n\n---\n_Generated by [jscpd](https://github.com/kucherenko/jscpd) · minTokens: 100_'

            const marker = '<!-- jscpd-report -->'
            body = marker + '\n' + body

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c => c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

  # ── SonarCloud CPD API report (PR only) ───────────────────────────────────
  sonar-cpd-report:
    name: SonarCloud CPD Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Wait for SonarCloud analysis
        id: sonar-wait
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PROJECT_KEY="xzawed_xzawed-pais"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          MAX_WAIT=300
          ELAPSED=0

          echo "Waiting for SonarCloud analysis on PR #${PR_NUMBER}..."
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            curl -sf -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/ce/activity?component=${PROJECT_KEY}&pullRequest=${PR_NUMBER}&ps=1" \
              -o /tmp/sonar-status.json 2>/dev/null || echo '{"tasks":[]}' > /tmp/sonar-status.json
            STATUS=$(python3 -c "import json; d=json.load(open('/tmp/sonar-status.json')); t=d.get('tasks',[]); print(t[0]['status'] if t else 'NONE')")
            echo "  Status: ${STATUS} (${ELAPSED}s elapsed)"
            if [ "${STATUS}" = "SUCCESS" ] || [ "${STATUS}" = "FAILED" ] || [ "${STATUS}" = "CANCELED" ]; then
              echo "sonar_status=${STATUS}" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 20
            ELAPSED=$((ELAPSED + 20))
          done
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "sonar_status=TIMEOUT" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch CPD breakdown from SonarCloud API
        id: sonar-cpd
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          PROJECT_KEY="xzawed_xzawed-pais"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          python3 - <<'PYEOF'
          import os, sys, json, urllib.request, urllib.error

          token = os.environ["SONAR_TOKEN"]
          project = "xzawed_xzawed-pais"
          pr = os.environ.get("PR_NUMBER", "")

          def api(path):
              req = urllib.request.Request(
                  f"https://sonarcloud.io/api/{path}",
                  headers={"Authorization": f"Bearer {token}"}
              )
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          PR_NUMBER = "${{ github.event.pull_request.number }}"

          # Quality gate status
          try:
              gate = api(f"qualitygates/project_status?projectKey={project}&pullRequest={PR_NUMBER}")
              gate_status = gate["projectStatus"]["status"]
          except Exception as e:
              gate_status = f"ERROR({e})"

          # File-level CPD metrics
          try:
              tree = api(
                  f"measures/component_tree?component={project}&pullRequest={PR_NUMBER}"
                  f"&metricKeys=new_duplicated_lines,duplicated_lines_density"
                  f"&strategy=leaves&s=metric&metricSort=new_duplicated_lines&asc=false&ps=20"
              )
              components = tree.get("components", [])
          except Exception as e:
              components = []
              print(f"Warning: {e}", file=sys.stderr)

          lines = [f"gate={gate_status}"]
          rows = []
          for c in components:
              name = c.get("name", c.get("key", "?"))
              path = c.get("path", "")
              metrics = {m["metric"]: m.get("value", m.get("period", {}).get("value", "0")) for m in c.get("measures", [])}
              new_dup = metrics.get("new_duplicated_lines", "0")
              density = metrics.get("duplicated_lines_density", "0")
              if float(new_dup or 0) > 0 or float(density or 0) > 3.0:
                  rows.append(f"{path or name}|{new_dup}|{density}%")

          if rows:
              lines.append("has_issues=true")
              lines.append("rows=" + ";;".join(rows))
          else:
              lines.append("has_issues=false")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

      - name: Post SonarCloud CPD comment
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        env:
          GATE: ${{ steps.sonar-cpd.outputs.gate }}
          HAS_ISSUES: ${{ steps.sonar-cpd.outputs.has_issues }}
          ROWS: ${{ steps.sonar-cpd.outputs.rows }}
          SONAR_STATUS: ${{ steps.sonar-wait.outputs.sonar_status }}
        with:
          script: |
            const marker = '<!-- sonar-cpd-report -->'
            const gate = process.env.GATE || 'UNKNOWN'
            const hasIssues = process.env.HAS_ISSUES === 'true'
            const sonarStatus = process.env.SONAR_STATUS || 'UNKNOWN'

            let body = marker + '\n## SonarCloud CPD Analysis\n\n'

            if (sonarStatus === 'TIMEOUT') {
              body += '⏳ SonarCloud analysis did not complete within 5 minutes. Check the [dashboard](https://sonarcloud.io/project/overview?id=xzawed_xzawed-pais) manually.\n'
            } else {
              const gateIcon = gate === 'OK' ? '✅' : gate === 'ERROR' ? '❌' : '⚠️'
              body += `**Quality Gate:** ${gateIcon} ${gate}\n\n`

              if (hasIssues) {
                body += '### Files with Duplications\n\n'
                body += '| File | New Dup Lines | Density |\n|---|---|---|\n'
                const rows = process.env.ROWS.split(';;').filter(Boolean)
                for (const row of rows) {
                  const [file, newDup, density] = row.split('|')
                  body += `| \`${file}\` | ${newDup} | ${density} |\n`
                }
                body += '\n> Fix: Extract repeated patterns into helpers, or add to `sonar.exclusions` in `sonar-project.properties`.\n'
              } else {
                body += '✅ No CPD issues detected on new code.\n'
              }
            }

            body += `\n---\n_[SonarCloud Dashboard](https://sonarcloud.io/project/overview?id=xzawed_xzawed-pais) · Analysis: ${sonarStatus}_`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c => c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

  # ── SonarCloud Analysis ───────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [turborepo, independent, shared-lib]
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # upload-artifact@v4 strips common path prefix from single-file artifacts,
      # so each artifact must be downloaded to its correct target directory.
      - name: Download coverage - xzawedOrchestrator
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedOrchestrator
          path: xzawedOrchestrator/packages

      - name: Download coverage - xzawedManager
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedManager
          path: xzawedManager/packages

      - name: Download coverage - xzawedPlanner
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedPlanner
          path: xzawedPlanner/coverage

      - name: Download coverage - xzawedDeveloper
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedDeveloper
          path: xzawedDeveloper/coverage

      - name: Download coverage - xzawedDesigner
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedDesigner
          path: xzawedDesigner/coverage

      - name: Download coverage - xzawedTester
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedTester
          path: xzawedTester/coverage

      - name: Download coverage - xzawedBuilder
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedBuilder
          path: xzawedBuilder/coverage

      - name: Download coverage - xzawedWatcher
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedWatcher
          path: xzawedWatcher/coverage

      - name: Download coverage - xzawedSecurity
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedSecurity
          path: xzawedSecurity/coverage

      - name: Download coverage - xzawedShared
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: coverage-xzawedShared
          path: xzawedShared/coverage

      - name: Prefix lcov paths with package directories
        run: |
          python3 - << 'PYEOF'
          import os, re

          prefixes = {
              'xzawedOrchestrator/packages/server/coverage/lcov.info': 'xzawedOrchestrator/packages/server/',
              'xzawedOrchestrator/packages/app/coverage/lcov.info': 'xzawedOrchestrator/packages/app/',
              'xzawedOrchestrator/packages/ui/coverage/lcov.info': 'xzawedOrchestrator/packages/ui/',
              'xzawedManager/packages/server/coverage/lcov.info': 'xzawedManager/packages/server/',
              'xzawedPlanner/coverage/lcov.info': 'xzawedPlanner/',
              'xzawedDeveloper/coverage/lcov.info': 'xzawedDeveloper/',
              'xzawedDesigner/coverage/lcov.info': 'xzawedDesigner/',
              'xzawedTester/coverage/lcov.info': 'xzawedTester/',
              'xzawedBuilder/coverage/lcov.info': 'xzawedBuilder/',
              'xzawedWatcher/coverage/lcov.info': 'xzawedWatcher/',
              'xzawedSecurity/coverage/lcov.info': 'xzawedSecurity/',
              'xzawedShared/coverage/lcov.info': 'xzawedShared/',
          }

          for lcov_path, prefix in prefixes.items():
              if not os.path.exists(lcov_path):
                  continue
              with open(lcov_path, encoding='utf-8') as f:
                  content = f.read()
              content = re.sub(r'^SF:', f'SF:{prefix}', content, flags=re.MULTILINE)
              with open(lcov_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f'Prefixed {lcov_path} with {prefix}')
          PYEOF

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Summary gate (required for branch protection) ─────────────────────────
  all-checks-pass:
    name: All checks pass
    runs-on: ubuntu-latest
    needs: [turborepo, independent, redis-integration, playwright-e2e, launcher, shared-lib]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.turborepo.result }}" != "success" || "${{ needs.independent.result }}" != "success" || "${{ needs.redis-integration.result }}" != "success" || "${{ needs.playwright-e2e.result }}" != "success" || "${{ needs.launcher.result }}" != "success" || "${{ needs.shared-lib.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
