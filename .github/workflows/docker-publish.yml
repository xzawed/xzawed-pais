name: Docker Publish

on:
  push:
    branches: [master]
    paths:
      - 'xzawed*/src/**'
      - 'xzawed*/Dockerfile'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: orchestrator, dir: xzawedOrchestrator }
          - { name: manager,      dir: xzawedManager }
          - { name: planner,      dir: xzawedPlanner }
          - { name: developer,    dir: xzawedDeveloper }
          - { name: designer,     dir: xzawedDesigner }
          - { name: tester,       dir: xzawedTester }
          - { name: builder,      dir: xzawedBuilder }
          - { name: watcher,      dir: xzawedWatcher }
          - { name: security,     dir: xzawedSecurity }

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ${{ matrix.service.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/xzawed/xzawed-${{ matrix.service.name }}:latest
            ghcr.io/xzawed/xzawed-${{ matrix.service.name }}:${{ github.sha }}
