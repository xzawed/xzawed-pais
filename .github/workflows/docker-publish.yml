name: Docker Publish

on:
  push:
    branches: [master]
    paths:
      - 'xzawed*/src/**'              # 독립 서비스 (Security, Planner, Developer 등)
      - 'xzawed*/packages/*/src/**'   # Turborepo 서비스 (Orchestrator, Manager)
      - 'xzawed*/Dockerfile'
      - 'xzawed*/Dockerfile.dockerignore'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: orchestrator, dir: xzawedOrchestrator }
          - { name: manager,      dir: xzawedManager }
          - { name: planner,      dir: xzawedPlanner }
          - { name: developer,    dir: xzawedDeveloper }
          - { name: designer,     dir: xzawedDesigner }
          - { name: tester,       dir: xzawedTester }
          - { name: builder,      dir: xzawedBuilder }
          - { name: watcher,      dir: xzawedWatcher }
          - { name: security,     dir: xzawedSecurity }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service.dir }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/xzawed/xzawed-${{ matrix.service.name }}:latest
            ghcr.io/xzawed/xzawed-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.service.name }}
