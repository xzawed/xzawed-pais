name: Docker Publish

on:
  push:
    branches: [master]
    paths:
      - 'xzawed*/src/**'
      - 'xzawed*/Dockerfile'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: orchestrator, dir: xzawedOrchestrator }
          - { name: manager,      dir: xzawedManager }
          - { name: planner,      dir: xzawedPlanner }
          - { name: developer,    dir: xzawedDeveloper }
          - { name: designer,     dir: xzawedDesigner }
          - { name: tester,       dir: xzawedTester }
          - { name: builder,      dir: xzawedBuilder }
          - { name: watcher,      dir: xzawedWatcher }
          - { name: security,     dir: xzawedSecurity }

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ${{ matrix.service.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/xzawed/xzawed-${{ matrix.service.name }}:latest
            ghcr.io/xzawed/xzawed-${{ matrix.service.name }}:${{ github.sha }}
