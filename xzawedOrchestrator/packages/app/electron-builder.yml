appId: com.xzawed.orchestrator
productName: xzawedOrchestrator
asar: true
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - package.json
  - "!**/.env"
  - "!**/*.pem"
  - "!**/credentials*"
  - "!**/*.key"
win:
  target: nsis
mac:
  target: dmg
linux:
  target: AppImage
