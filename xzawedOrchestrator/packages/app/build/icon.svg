<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4aaa"/>
      <stop offset="100%" style="stop-color:#6a6acc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#accent)" stroke-width="12" opacity="0.6"/>

  <!-- Center node -->
  <circle cx="256" cy="256" r="48" fill="url(#accent)"/>

  <!-- 9 agent nodes arranged in a circle -->
  <!-- Node 1 (top) -->
  <circle cx="256" cy="110" r="22" fill="#4a4aaa" opacity="0.9"/>
  <!-- Node 2 (top-right) -->
  <circle cx="366" cy="152" r="22" fill="#4a4aaa" opacity="0.9"/>
  <!-- Node 3 (right) -->
  <circle cx="402" cy="256" r="22" fill="#4a4aaa" opacity="0.9"/>
  <!-- Node 4 (bottom-right) -->
  <circle cx="366" cy="360" r="22" fill="#4a4aaa" opacity="0.9"/>
  <!-- Node 5 (bottom) -->
  <circle cx="256" cy="402" r="22" fill="#4a4aaa" opacity="0.9"/>
  <!-- Node 6 (bottom-left) -->
  <circle cx="146" cy="360" r="22" fill="#4a4aaa" opacity="0.9"/>
  <!-- Node 7 (left) -->
  <circle cx="110" cy="256" r="22" fill="#4a4aaa" opacity="0.9"/>
  <!-- Node 8 (top-left) -->
  <circle cx="146" cy="152" r="22" fill="#4a4aaa" opacity="0.9"/>

  <!-- Connection lines from center to nodes -->
  <line x1="256" y1="256" x2="256" y2="132" stroke="#6a6acc" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="348" y2="170" stroke="#6a6acc" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="380" y2="256" stroke="#6a6acc" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="348" y2="342" stroke="#6a6acc" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="256" y2="380" stroke="#6a6acc" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="164" y2="342" stroke="#6a6acc" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="132" y2="256" stroke="#6a6acc" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="164" y2="170" stroke="#6a6acc" stroke-width="3" opacity="0.5"/>

  <!-- Center icon: robot/AI symbol -->
  <text x="256" y="272" font-size="44" text-anchor="middle" fill="white" font-family="monospace" font-weight="bold">AI</text>
</svg>
