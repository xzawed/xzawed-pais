name: xzawed-pais

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: xzawed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: xzawed_orchestrator
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xzawed"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Orchestrator (port 3000) ────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: xzawedOrchestrator/Dockerfile
    ports:
      - "3000:3000"
    env_file: ./xzawedOrchestrator/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      CLAUDE_MODE: ${CLAUDE_MODE:-api}
      MANAGER_URL: http://manager:3001
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Manager (port 3001) ─────────────────────────────────────────────────────
  manager:
    build:
      context: .
      dockerfile: xzawedManager/Dockerfile
    ports:
      - "3001:3001"
    env_file: ./xzawedManager/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      CLAUDE_MODE: ${CLAUDE_MODE:-api}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Planner (port 3002) ─────────────────────────────────────────────────────
  planner:
    build:
      context: .
      dockerfile: xzawedPlanner/Dockerfile
    ports:
      - "3002:3002"
    env_file: ./xzawedPlanner/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Developer (port 3003) ───────────────────────────────────────────────────
  developer:
    build:
      context: .
      dockerfile: xzawedDeveloper/Dockerfile
    ports:
      - "3003:3003"
    env_file: ./xzawedDeveloper/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3003"
      WORKSPACE_ROOT: /workspace
    volumes:
      - workspace:/workspace
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Designer (port 3004) ────────────────────────────────────────────────────
  designer:
    build:
      context: .
      dockerfile: xzawedDesigner/Dockerfile
    ports:
      - "3004:3004"
    env_file: ./xzawedDesigner/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3004"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Tester (port 3005) ──────────────────────────────────────────────────────
  tester:
    build:
      context: .
      dockerfile: xzawedTester/Dockerfile
    ports:
      - "3005:3005"
    env_file: ./xzawedTester/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3005"
      WORKSPACE_ROOT: /workspace
    volumes:
      - workspace:/workspace
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3005/health || exit 1"]
